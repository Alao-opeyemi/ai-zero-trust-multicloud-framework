name: Terraform Scan

on:
  push:
    branches: [ main ]
    paths: [ '**/*.tf' ]
  pull_request:
    branches: [ main ]
    paths: [ '**/*.tf' ]

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        framework: terraform

  kics:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Run KICS
      uses: Checkmarx/kics-github-action@v2
      with:
        path: '.'
        platform_type: terraform

  regula:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Regula
      run: |
        curl -L https://github.com/fugue/regula/releases/latest/download/regula-linux -o regula
        chmod +x regula
    - name: Run Regula
      run: ./regula run .
